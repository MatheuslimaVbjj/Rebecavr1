<svg width="900" height="700" viewBox="0 0 900 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="700">
      <stop stop-color="#0b1f38"/>
      <stop offset=".55" stop-color="#071427"/>
      <stop offset="1" stop-color="#030a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="10%" r="55%">
      <stop stop-color="#f2d275" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0d2440"/>
      <stop offset="1" stop-color="#050f20"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#caa45d"/>
      <stop offset="1" stop-color="#f2d275"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity=".5"/>
    </filter>
  </defs>

  <rect width="900" height="700" fill="url(#bg)"/>
  <rect width="900" height="700" fill="url(#glow)"/>

  <!-- lanyard straps -->
  <path d="M370 0 L330 250 L350 250 L390 0 Z" fill="url(#goldGrad)" opacity=".9"/>
  <path d="M530 0 L570 250 L550 250 L510 0 Z" fill="url(#goldGrad)" opacity=".9"/>
  <rect x="335" y="245" width="230" height="18" rx="4" fill="#0a1a30" stroke="#f2d27555"/>

  <!-- badge card -->
  <g filter="url(#soft)">
    <rect x="290" y="255" width="320" height="410" rx="24" fill="url(#cardGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

    <!-- top accent band -->
    <rect x="290" y="255" width="320" height="64" rx="24" fill="url(#goldGrad)"/>
    <rect x="290" y="295" width="320" height="24" fill="url(#goldGrad)"/>
    <text x="450" y="296" text-anchor="middle" fill="#03111a" font-family="Georgia, serif" font-size="24" font-weight="700" letter-spacing="2">ATLÂNTICO</text>

    <!-- category tag -->
    <rect x="355" y="338" width="190" height="32" rx="16" fill="none" stroke="#f2d275" stroke-width="1.5"/>
    <text x="450" y="359" text-anchor="middle" fill="#f2d275" font-family="Inter, sans-serif" font-size="11" font-weight="800" letter-spacing="2">PARTICIPANTE</text>

    <!-- photo circle -->
    <circle cx="450" cy="440" r="58" fill="#0a1a30" stroke="#f2d27566" stroke-width="1.5"/>
    <path d="M450 410 C438 410 429 420 429 432 C429 442 435 449 443 452 L443 460 C420 466 405 483 401 505 L499 505 C495 483 480 466 457 460 L457 452 C465 449 471 442 471 432 C471 420 462 410 450 410Z" fill="#f2d27544"/>

    <!-- name -->
    <rect x="350" y="518" width="200" height="20" rx="6" fill="#f3ead5" opacity=".85"/>
    <text x="450" y="533" text-anchor="middle" fill="#03111a" font-family="Georgia, serif" font-size="14" font-weight="700">NOME DO PARTICIPANTE</text>

    <line x1="330" y1="556" x2="570" y2="556" stroke="#f2d27540" stroke-width="1"/>

    <!-- event info -->
    <text x="450" y="580" text-anchor="middle" fill="#f2d275" font-family="Inter, sans-serif" font-size="12" letter-spacing="3">EVENTO ATLÂNTICO 2026</text>
    <text x="450" y="600" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="11" opacity=".6" letter-spacing="1">18 — 20 SETEMBRO · LISBOA</text>

    <!-- QR code -->
    <g transform="translate(410 615)">
      <rect width="80" height="80" rx="8" fill="#f3ead5"/>
      <g fill="#03111a">
        <rect x="8" y="8" width="18" height="18"/>
        <rect x="54" y="8" width="18" height="18"/>
        <rect x="8" y="54" width="18" height="18"/>
        <rect x="32" y="8" width="8" height="8"/>
        <rect x="32" y="32" width="16" height="16"/>
        <rect x="56" y="32" width="8" height="8"/>
        <rect x="32" y="56" width="8" height="8"/>
        <rect x="48" y="56" width="8" height="8"/>
        <rect x="56" y="56" width="16" height="16"/>
      </g>
    </g>
  </g>

  <text x="450" y="682" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" opacity=".38">EXEMPLO ILUSTRATIVO DE CREDENCIAL — PERSONALIZÁVEL POR EVENTO</text>
</svg>
