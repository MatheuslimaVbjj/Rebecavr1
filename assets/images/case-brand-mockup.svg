<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="650">
      <stop stop-color="#0b1f38"/>
      <stop offset=".55" stop-color="#071427"/>
      <stop offset="1" stop-color="#030a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="30%" r="45%">
      <stop stop-color="#f2d275" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0d2440"/>
      <stop offset="1" stop-color="#071427"/>
    </linearGradient>
  </defs>

  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="url(#glow)"/>

  <!-- back card (subtle stacked identity piece) -->
  <g transform="rotate(-6 450 330)">
    <rect x="150" y="150" width="560" height="330" rx="22" fill="#0a1d34" stroke="#f2d27530" stroke-width="1.5"/>
  </g>

  <!-- main business card mockup -->
  <g filter="url(#soft)" transform="rotate(-2 450 330)">
    <rect x="170" y="168" width="560" height="330" rx="22" fill="url(#cardGrad)" stroke="#f2d27566" stroke-width="1.5"/>

    <!-- logo -->
    <image href="../logo/logo-atlantico-studio.png" x="206" y="204" width="76" height="76" clip-path="circle(38px at 38px 38px)"/>
    <circle cx="244" cy="242" r="39" fill="none" stroke="#f2d275" stroke-opacity=".55" stroke-width="1.5"/>

    <text x="300" y="234" fill="#f5e9c8" font-family="Georgia, serif" font-size="30" letter-spacing="1">ATLÂNTICO</text>
    <text x="300" y="264" fill="#f2d275" font-family="Georgia, serif" font-size="18" letter-spacing="6">STUDIO</text>

    <line x1="206" y1="304" x2="694" y2="304" stroke="#f2d27540" stroke-width="1"/>

    <text x="206" y="344" fill="#f3ead5" font-family="Inter, sans-serif" font-size="14" letter-spacing="3" opacity=".7">MARKETING · VENDAS · BRANDING</text>
    <text x="206" y="374" fill="#f3ead5" font-family="Inter, sans-serif" font-size="13" opacity=".5">atlanticostudio.pt</text>

    <!-- color palette swatches -->
    <g transform="translate(206 410)">
      <rect x="0" y="0" width="44" height="44" rx="8" fill="#071427" stroke="#f2d27555"/>
      <rect x="54" y="0" width="44" height="44" rx="8" fill="#caa45d"/>
      <rect x="108" y="0" width="44" height="44" rx="8" fill="#f2d275"/>
      <rect x="162" y="0" width="44" height="44" rx="8" fill="#f3ead5"/>
    </g>
  </g>

  <text x="450" y="600" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" opacity=".38">EXEMPLO ILUSTRATIVO — AGUARDANDO MATERIAL REAL DO CLIENTE</text>
</svg>
